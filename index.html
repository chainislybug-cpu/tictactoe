<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Switzerland Mountain Explorer</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <link rel="stylesheet" href="style.css" />
  <script async src="https://ga.jspm.io/npm:es-module-shims@1.8.0/dist/es-module-shims.js"></script>
  <script type="importmap">{"imports":{"three":"https://cdnjs.cloudflare.com/ajax/libs/three.js/0.158.0/three.module.min.js"}}</script>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>Switzerland Mountain Explorer</h1>
    <div id="filter-count">Loading mountains…</div>
  </div>

  <div id="sidebar-filters">

    <div class="filter-section">
      <h3>Elevation &amp; Terrain</h3>

      <div class="filter-group">
        <label>Elevation (m) <span id="val-elev">0 – 5000</span></label>
        <div class="range-row">
          <input type="range" id="elev-min" min="0" max="5000" value="0" step="50">
          <input type="range" id="elev-max" min="0" max="5000" value="5000" step="50">
        </div>
      </div>

      <div class="filter-group">
        <label>Prominence (m) <span id="val-prom">0 – 5000</span></label>
        <div class="range-row">
          <input type="range" id="prom-min" min="0" max="5000" value="0" step="50">
          <input type="range" id="prom-max" min="0" max="5000" value="5000" step="50">
        </div>
      </div>

      <div class="filter-group">
        <label>Isolation (km) <span id="val-isol">0 – 600</span></label>
        <div class="range-row">
          <input type="range" id="isol-min" min="0" max="600" value="0" step="5">
          <input type="range" id="isol-max" min="0" max="600" value="600" step="5">
        </div>
      </div>
    </div>

    <div class="filter-section">
      <h3>Ratings</h3>

      <div class="filter-group">
        <label>Difficulty <span id="val-diff">1 – 5</span></label>
        <div class="range-row">
          <input type="range" id="diff-min" min="1" max="5" value="1" step="1">
          <input type="range" id="diff-max" min="1" max="5" value="5" step="1">
        </div>
      </div>

      <div class="filter-group">
        <label>Beauty <span id="val-beauty">1 – 5</span></label>
        <div class="range-row">
          <input type="range" id="beauty-min" min="1" max="5" value="1" step="1">
          <input type="range" id="beauty-max" min="1" max="5" value="5" step="1">
        </div>
      </div>

      <div class="filter-group">
        <label>Nature <span id="val-nature">1 – 5</span></label>
        <div class="range-row">
          <input type="range" id="nature-min" min="1" max="5" value="1" step="1">
          <input type="range" id="nature-max" min="1" max="5" value="5" step="1">
        </div>
      </div>
    </div>

    <div class="filter-section">
      <h3>Tags</h3>
      <div class="tag-toggle">
        <button id="tag-mode-any" class="active" onclick="setTagMode('any')">Match Any</button>
        <button id="tag-mode-all" onclick="setTagMode('all')">Match All</button>
      </div>
      <div class="tags-grid" id="tags-grid"></div>
    </div>

  </div>

  <div id="sidebar-footer">
    <button id="btn-reset" onclick="resetFilters()">Reset All Filters</button>
  </div>
</div>

<div id="map"></div>

<div id="peak-card">
  <canvas id="peak-canvas"></canvas>
  <div id="peak-info">
    <div id="peak-name"></div>
    <div id="peak-canton"></div>
    <div class="peak-stats">
      <div class="stat"><div class="stat-label">Elevation</div><div class="stat-val" id="si-elev"></div></div>
      <div class="stat"><div class="stat-label">Prominence</div><div class="stat-val" id="si-prom"></div></div>
      <div class="stat"><div class="stat-label">Isolation</div><div class="stat-val" id="si-isol"></div></div>
      <div class="stat"><div class="stat-label">Canton</div><div class="stat-val" id="si-canton"></div></div>
    </div>
    <div class="rating-row"><span class="rating-label">Difficulty</span><span class="stars" id="si-diff"></span></div>
    <div class="rating-row"><span class="rating-label">Beauty</span><span class="stars" id="si-beauty"></span></div>
    <div class="rating-row"><span class="rating-label">Nature</span><span class="stars" id="si-nature"></span></div>
    <div class="peak-tags" id="si-tags"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="mountains.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
